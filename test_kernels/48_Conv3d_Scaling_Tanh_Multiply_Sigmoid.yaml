inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: SCALING_FACTOR
  - dim: BIAS_SHAPE

ci:
  - params: [X]
    dtype: bfloat16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 8
      DEPTH: 8
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      SCALING_FACTOR: 2
      BIAS_SHAPE: [8, 1, 1, 1] # TODO: bind these to other dims

bench-xpu:
  - params: [X]
    dtype: bfloat16
    dims:
      BATCH_SIZE: 128
      IN_CHANNELS: 3
      OUT_CHANNELS: 16
      DEPTH: 16
      HEIGHT: 64
      WIDTH: 64
      KERNEL_SIZE: 3
      SCALING_FACTOR: 2
      BIAS_SHAPE: [16, 1, 1, 1]
