inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: inherit

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: CONSTANT

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 32
      OUT_FEATURES: 32
      CONSTANT: 2.0

bench-xpu:
  - params: [X]
    dtype: bfloat16
    dims:
      BATCH_SIZE: 128
      IN_FEATURES: 16384
      OUT_FEATURES: 16384
      CONSTANT: 2.0
    flop: "2*BATCH_SIZE*OUT_FEATURES*IN_FEATURES"

