
inputs:
  Q:
    shape: [B, A, S, D]
    dtype: float16
  K:
    shape: [B, A, S, D]
    dtype: float16
  V:
    shape: [B, A, S, D]
    dtype: float16

inits:
  # Model ctor can take D (head dim) if you want; harmless for fwd-only launchers.
  - dim: D

ci:
  - params: [Q, K, V]
    dtype: float32
    dims:
      # Small CI shape: fast correctness sanity
      B: 1
      A: 4
      S: 128
      D: 64
    flop: "2*B*A*S*S*D"

bench-gpu:
  # Falcon 40B: hidden 4544, heads 71 -> D=64 (non power-of-two heads; very “weird-shape” friendly)
  # This is a great stress test for head-count irregularity.
  - params: [Q, K, V]
    dtype: float16
    dims:
      B: 1
      A: 71
      S: 2048
      D: 64
    flop: "4*B*A*S*S*D"

