inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: inherit

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: KERNEL_SIZE
  - dim: SCALE_FACTOR

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 32
      OUT_FEATURES: 32
      KERNEL_SIZE: 2
      SCALE_FACTOR: 0.5

bench-xpu:
  - params: [X]
    dtype: bfloat16
    dims:
      BATCH_SIZE: 128
      IN_FEATURES: 32768
      OUT_FEATURES: 32768
      KERNEL_SIZE: 2
      SCALE_FACTOR: 0.5
    flop: "2*BATCH_SIZE*OUT_FEATURES*IN_FEATURES"

